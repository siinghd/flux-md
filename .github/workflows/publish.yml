name: Publish to npm

# Release automation: tag a release (vX.Y.Z) to build, gate on the full test
# suite, and publish to npm with SLSA provenance. Provenance attestations can
# only be produced from a CI workflow with id-token, never from a local publish.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Pack only — build + test but do not publish"
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write # required for `npm publish --provenance`

jobs:
  publish:
    name: Build, gate, publish (provenance)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/flux-md-core
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
      - run: bun install --frozen-lockfile

      # Gate the release on the same checks CI enforces, so a tag can never ship
      # a broken build.
      - name: Build WASM
        run: bun run build:wasm
      - name: Typecheck the package
        working-directory: packages/flux-md
        run: bunx tsc --noEmit -p tsconfig.json
      - name: JS package tests
        run: bun run test:components
      - name: SSR cold-import (fresh process, no browser globals)
        working-directory: packages/flux-md
        run: bun run test:ssr-cold
      - name: Rust core (CommonMark + GFM floors)
        env:
          CMARK_MIN_PASS: "652"
          GFM_MIN_PASS: "23"
        run: bun run test:rust
      - name: Assert the tarball ships a non-empty WASM artifact
        working-directory: packages/flux-md
        # wasm-pack emits a nested src/wasm/.gitignore ("*"); build:wasm deletes
        # it so the files:["src"] allowlist ships the WASM. Tripwire against a
        # WASM-less publish. Pack into a clean temp dir and glob the tarball
        # (don't parse npm's stdout, which varies by version).
        run: |
          set -euo pipefail
          dest="$(mktemp -d)"
          npm pack --pack-destination "$dest" >/dev/null 2>&1
          tarball="$(echo "$dest"/*.tgz)"
          test -f "$tarball" || { echo "::error::npm pack produced no tarball"; exit 1; }
          tar -tzf "$tarball" | grep -q '/src/wasm/flux_md_core_bg\.wasm$' \
            || { echo "::error::publish tarball is missing src/wasm/flux_md_core_bg.wasm"; exit 1; }
          size=$(tar -tzvf "$tarball" | awk '/\/src\/wasm\/flux_md_core_bg\.wasm$/ { print $3; exit }')
          test "${size:-0}" -gt 0 || { echo "::error::WASM artifact is present but empty"; exit 1; }
          echo "OK: tarball ships WASM (${size} bytes)"
          rm -rf "$dest"

      # Decide whether to actually publish — so a tag for an already-published
      # version, a dry-run, or a repo without NPM_TOKEN set SKIPS (green) instead
      # of failing red. The build + tarball checks above still gate the release.
      - name: Decide whether to publish
        id: gate
        working-directory: packages/flux-md
        env:
          HAS_TOKEN: ${{ secrets.NPM_TOKEN != '' }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        run: |
          set -euo pipefail
          ver="$(node -p "require('./package.json').version")"
          if [ "${DRY_RUN}" = "true" ]; then
            echo "::notice::dry_run requested — skipping publish (build + checks ran)."
            echo "publish=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          if [ "${HAS_TOKEN}" != "true" ]; then
            echo "::notice::NPM_TOKEN secret not set — skipping publish. Set it to enable provenance publishing from a tag."
            echo "publish=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          if npm view "flux-md@${ver}" version >/dev/null 2>&1; then
            echo "::notice::flux-md@${ver} is already published — skipping (no-op)."
            echo "publish=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          echo "publish=true" >> "$GITHUB_OUTPUT"

      - name: Publish to npm (with provenance)
        if: ${{ steps.gate.outputs.publish == 'true' }}
        working-directory: packages/flux-md
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
