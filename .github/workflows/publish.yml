name: Publish to npm

# Release automation: push a tag (vX.Y.Z) to build, gate on the full test suite,
# and publish to npm via OIDC TRUSTED PUBLISHING — no NPM_TOKEN secret, ever.
#
# ── ONE-TIME SETUP (npmjs.com) ──────────────────────────────────────────────
# On npmjs.com → the `flux-md` package → Settings → Trusted Publishers → add a
# GitHub Actions publisher:
#     Organization or user: siinghd
#     Repository:           flux-md
#     Workflow filename:    publish.yml     (filename only, with .yml)
#     Allowed actions:      npm publish
# After that, every `git tag vX.Y.Z && git push --tags` publishes automatically.
# No token is generated, stored, or pasted — the workflow authenticates with a
# short-lived GitHub OIDC token (the `id-token: write` permission below), and npm
# generates SLSA provenance automatically. This replaces the old NPM_TOKEN secret.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Pack only — build + test but do not publish"
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write # OIDC: lets npm authenticate to the registry + attach provenance

jobs:
  publish:
    name: Build, gate, publish (OIDC trusted publishing + provenance)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install nightly + rust-src for the size-optimized WASM build
        # build:wasm uses -Z build-std + panic=immediate-abort (nightly only) to
        # shrink the binary; that needs the nightly toolchain with the rust-src
        # component and the wasm target. Native cargo (test:rust) stays on stable.
        run: rustup toolchain install nightly --profile minimal --component rust-src --target wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/flux-md-core
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          # Trusted publishing requires Node >= 22.14.0 and npm >= 11.5.1.
          node-version: "22"
          registry-url: "https://registry.npmjs.org"
      - name: Upgrade npm to a trusted-publishing-capable version (>= 11.5.1)
        run: |
          npm install -g npm@latest
          npm --version
      - run: bun install --frozen-lockfile

      # Gate the release on the SAME checks CI enforces, so a tag can never ship a
      # broken build.
      - name: Build WASM
        run: bun run build:wasm
      - name: Typecheck the package
        working-directory: packages/flux-md
        run: bunx tsc --noEmit -p tsconfig.json
      - name: JS package tests
        run: bun run test:components
      - name: SSR cold-import (fresh process, no browser globals)
        working-directory: packages/flux-md
        run: bun run test:ssr-cold
      - name: Consumer smoke (Vite output — separate worker chunk, non-inlined wasm)
        working-directory: packages/flux-md
        run: bun run test:consumer-smoke
      - name: Rust core (CommonMark + GFM floors)
        env:
          CMARK_MIN_PASS: "652"
          GFM_MIN_PASS: "23"
        run: bun run test:rust
      - name: Complexity-scaling gate (streaming stays sub-quadratic)
        working-directory: crates/flux-md-core
        run: cargo test --release --features perf_counters --test scaling
      - name: Assert the tarball ships a non-empty WASM artifact
        working-directory: packages/flux-md
        # wasm-pack emits a nested src/wasm/.gitignore ("*"); build:wasm deletes
        # it so the files:["src"] allowlist ships the WASM. Tripwire against a
        # WASM-less publish. Pack into a clean temp dir and glob the tarball
        # (don't parse npm's stdout, which varies by version).
        run: |
          set -euo pipefail
          dest="$(mktemp -d)"
          npm pack --pack-destination "$dest" >/dev/null 2>&1
          tarball="$(echo "$dest"/*.tgz)"
          test -f "$tarball" || { echo "::error::npm pack produced no tarball"; exit 1; }
          tar -tzf "$tarball" | grep -q '/src/wasm/flux_md_core_bg\.wasm$' \
            || { echo "::error::publish tarball is missing src/wasm/flux_md_core_bg.wasm"; exit 1; }
          size=$(tar -tzvf "$tarball" | awk '/\/src\/wasm\/flux_md_core_bg\.wasm$/ { print $3; exit }')
          test "${size:-0}" -gt 0 || { echo "::error::WASM artifact is present but empty"; exit 1; }
          echo "OK: tarball ships WASM (${size} bytes)"
          rm -rf "$dest"

      # Skip (green) for a dry-run or a tag whose version is already on npm, so
      # re-running a tag is a safe no-op. Otherwise publish via OIDC. (Auth needs
      # NO secret — see the one-time npmjs.com Trusted Publisher setup at the top.)
      - name: Decide whether to publish
        id: gate
        working-directory: packages/flux-md
        env:
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run }}
        run: |
          set -euo pipefail
          ver="$(node -p "require('./package.json').version")"
          if [ "${DRY_RUN}" = "true" ]; then
            echo "::notice::dry_run requested — skipping publish (build + checks ran)."
            echo "publish=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          if npm view "flux-md@${ver}" version >/dev/null 2>&1; then
            echo "::notice::flux-md@${ver} is already published — skipping (no-op)."
            echo "publish=false" >> "$GITHUB_OUTPUT"; exit 0
          fi
          echo "publish=true" >> "$GITHUB_OUTPUT"

      - name: Publish to npm (OIDC trusted publishing, automatic provenance)
        if: ${{ steps.gate.outputs.publish == 'true' }}
        working-directory: packages/flux-md
        # No NODE_AUTH_TOKEN: npm >= 11.5.1 authenticates via the GitHub OIDC token
        # (id-token: write) against the package's configured Trusted Publisher, and
        # attaches SLSA provenance automatically. If this step errors with an auth
        # failure, the Trusted Publisher hasn't been configured on npmjs.com yet
        # (see the one-time setup block at the top of this file).
        run: npm publish --access public
