name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    name: Rust core (CommonMark 0.31 + GFM + footnotes + security)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/flux-md-core
      - name: cargo test (enforces the 652/652 + GFM floors)
        working-directory: crates/flux-md-core
        env:
          CMARK_MIN_PASS: "652"
          GFM_MIN_PASS: "23"
        run: cargo test --release

  js:
    name: WASM build + JS package (types, component/pool/store tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/flux-md-core
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Build WASM
        run: bun run build:wasm
      - name: Assert the publish tarball ships a non-empty WASM artifact
        working-directory: packages/flux-md
        # wasm-pack emits a nested src/wasm/.gitignore ("*"); build:wasm deletes
        # it so the files:["src"] allowlist ships the WASM. If that ever breaks,
        # the build still succeeds but `npm publish` silently ships a package
        # with no WASM — this step is the tripwire. Pack into a clean temp dir
        # and glob the tarball (don't parse npm's stdout, which varies by version).
        run: |
          set -euo pipefail
          dest="$(mktemp -d)"
          npm pack --pack-destination "$dest" >/dev/null 2>&1
          tarball="$(echo "$dest"/*.tgz)"
          test -f "$tarball" || { echo "::error::npm pack produced no tarball"; exit 1; }
          tar -tzf "$tarball" | grep -q '/src/wasm/flux_md_core_bg\.wasm$' \
            || { echo "::error::publish tarball is missing src/wasm/flux_md_core_bg.wasm"; exit 1; }
          size=$(tar -tzvf "$tarball" | awk '/\/src\/wasm\/flux_md_core_bg\.wasm$/ { print $3; exit }')
          test "${size:-0}" -gt 0 || { echo "::error::WASM artifact is present but empty"; exit 1; }
          echo "OK: tarball ships WASM (${size} bytes)"
          rm -rf "$dest"
      - name: Typecheck the package
        working-directory: packages/flux-md
        run: bunx tsc --noEmit -p tsconfig.json
      - name: Component / pool / store tests
        run: bun run test:components
      - name: Web build
        run: bun run build:web
