name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  rust:
    name: Rust core (CommonMark 0.31 + GFM + footnotes + security)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/flux-md-core
      - name: cargo test (enforces the 652/652 + GFM floors + proptest parity)
        working-directory: crates/flux-md-core
        env:
          CMARK_MIN_PASS: "652"
          GFM_MIN_PASS: "23"
        run: cargo test --release
      - name: Complexity-scaling gate (deterministic work-counter, not wall-clock)
        # Asserts streaming stays sub-quadratic on the committing/cached shapes,
        # by counting slow-path tail re-scan bytes (feature `perf_counters`, off
        # in every shipped build). Catches O(n²) cliffs before merge — the class
        # we used to find only after shipping (0.18.2/0.18.3/0.18.4).
        working-directory: crates/flux-md-core
        run: cargo test --release --features perf_counters --test scaling

  js:
    name: WASM build + JS package (types, component/pool/store tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install nightly + rust-src for the size-optimized WASM build
        # build:wasm uses -Z build-std + panic=immediate-abort (nightly only) to
        # shrink the binary; that needs the nightly toolchain with the rust-src
        # component and the wasm target. Native cargo stays on stable above.
        run: rustup toolchain install nightly --profile minimal --component rust-src --target wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/flux-md-core
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Build WASM
        run: bun run build:wasm
      - name: Build the compiled package (dist)
        working-directory: packages/flux-md
        # `npm publish` runs prepublishOnly (build:wasm + this build); `npm pack`
        # does NOT run prepublishOnly, so build dist explicitly before the tarball
        # tripwire below, otherwise it packs a stale/empty dist.
        run: node scripts/build.mjs
      - name: Assert the publish tarball ships a non-empty WASM artifact
        working-directory: packages/flux-md
        # The package ships compiled `dist` (files:["dist"]); the WASM lands at
        # dist/wasm/flux_md_core_bg.wasm. Tripwire against a silently WASM-less
        # publish. Pack into a clean temp dir and glob the tarball (don't parse
        # npm's stdout, which varies by version).
        run: |
          set -euo pipefail
          dest="$(mktemp -d)"
          npm pack --pack-destination "$dest" >/dev/null 2>&1
          tarball="$(echo "$dest"/*.tgz)"
          test -f "$tarball" || { echo "::error::npm pack produced no tarball"; exit 1; }
          tar -tzf "$tarball" | grep -q '/dist/wasm/flux_md_core_bg\.wasm$' \
            || { echo "::error::publish tarball is missing dist/wasm/flux_md_core_bg.wasm"; exit 1; }
          size=$(tar -tzvf "$tarball" | awk '/\/dist\/wasm\/flux_md_core_bg\.wasm$/ { print $3; exit }')
          test "${size:-0}" -gt 0 || { echo "::error::WASM artifact is present but empty"; exit 1; }
          echo "OK: tarball ships WASM (${size} bytes)"
          rm -rf "$dest"
      - name: Typecheck the package
        working-directory: packages/flux-md
        run: bunx tsc --noEmit -p tsconfig.json
      - name: Typecheck the tests
        working-directory: packages/flux-md
        run: bunx tsc --noEmit -p tsconfig.test.json
      - name: Component / pool / store tests
        run: bun run test:components
      - name: SSR cold-import (fresh process, no browser globals)
        # Load-bearing SSR guard: a fresh process so module top-level code runs
        # cold (the in-process ssr.test.ts can pass under bun's warm cache). Trips
        # if any entrypoint touches a browser global at import/construct/render.
        working-directory: packages/flux-md
        run: bun run test:ssr-cold
      - name: Web build
        run: bun run build:web
